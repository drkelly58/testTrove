# Example for Debian/Ubuntu system Apache (requires: sudo apt install apache2 libapache2-mod-php)
# Copy to /etc/apache2/sites-available/testtrove.conf then:
#   sudo a2enmod rewrite
#   sudo a2ensite testtrove
#   sudo systemctl reload apache2
#
# Replace paths and ServerName with your deployment.

<VirtualHost *:80>
    ServerName testtrove.local
    DocumentRoot /path/to/TestTrove/public

    <Directory /path/to/TestTrove/public>
        AllowOverride All
        Options FollowSymLinks
        Require all granted
    </Directory>

    DirectoryIndex index.html index.php

    ErrorLog ${APACHE_LOG_DIR}/testtrove-error.log
    CustomLog ${APACHE_LOG_DIR}/testtrove-access.log combined
</VirtualHost>
