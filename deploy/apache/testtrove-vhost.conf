# TestTrove — document root is the app "public" folder (PHP API + Vue build).
# Used by Homebrew Apache (Listen 8080). Replace paths below with your clone location.

<VirtualHost *:8080>
    ServerName localhost
    DocumentRoot "/path/to/TestTrove/public"

    <Directory "/path/to/TestTrove/public">
        AllowOverride All
        Options FollowSymLinks
        Require all granted
    </Directory>

    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    DirectoryIndex index.html index.php

    ErrorLog "/home/linuxbrew/.linuxbrew/var/log/httpd/testtrove-error_log"
    CustomLog "/home/linuxbrew/.linuxbrew/var/log/httpd/testtrove-access_log" common
</VirtualHost>
